[[headers]]
  for = "/*"
  [headers.values]
    Permissions-Policy = "encrypted-media=*, autoplay=*, picture-in-picture=*, web-share=*"
    Access-Control-Allow-Origin = "*"

[[redirects]]
  from = "/proxy1/*"
  to = "https://consumet-api.herokapp.com/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/proxy2/*"
  to = "https://api.consumet.org/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/consumet/*"
  to = "https://consumet.vercel.app/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/jikan/*"
  to = "https://api.jikan.moe/v4/:splat"
  status = 200
  force = true
